<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Altakathuf Foundation</title>
    <meta name="description" content="Takatuf Foundation Website" />
    <meta name="author" content="Takatuf Foundation" />

    <meta property="og:title" content="Altakathuf Foundation" />
    <meta property="og:description" content="Takatuf Foundation Website" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:image" content="/favicon.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!--
      Apply theme + dir before paint so dark-mode users don't see a light
      flash, and Arabic users don't see a brief LTR flash. Mirrors the logic
      in src/contexts/AppContext.tsx (getInitialTheme/getInitialLanguage).
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = saved === 'dark' || (!saved && prefersDark);
          if (dark) document.documentElement.classList.add('dark');

          var lang = localStorage.getItem('language');
          if (lang === 'ar' || lang === 'en') {
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
          }
        } catch (_) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <!-- IMPORTANT: DO NOT REMOVE THIS SCRIPT TAG OR THIS VERY COMMENT! -->

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
